version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: nexushr-postgres
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mp@762003
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./employee-service/src/main/resources/db/migration/V1__init_schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    container_name: nexushr-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Mp@762003
      SPRING_REDIS_HOST: redis
      JWT_SECRET: nexushr-super-secret-jwt-key-2026
    depends_on:
      - postgres
      - redis

  employee-service:
    build: ./employee-service
    container_name: nexushr-employee
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Mp@762003
    depends_on:
      - postgres

  payroll-service:
    build: ./payroll-service
    container_name: nexushr-payroll
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexushr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Mp@762003
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: nexushr-frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - employee-service
      - payroll-service

volumes:
  postgres_data: